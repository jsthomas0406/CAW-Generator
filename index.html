<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WWE CAW Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>WWE CAW Generator</h1>
      <p>Gameplay-focused CAW generator for WWE and NXT talent</p>
    </header>

    <main>
      <section class="search-card">
        <label for="wrestlerSelect" class="sr-only">Choose a wrestler</label>
        <select id="wrestlerSelect">
          <option value="">Select a wrestler</option>
          <option value="arianna grace">Arianna Grace</option>
          <option value="brad baylor">Brad Baylor</option>
          <option value="bronco nima">Bronco Nima</option>
          <option value="cutler james">Cutler James</option>
          <option value="dion lennox">Dion Lennox</option>
          <option value="eli knight">Eli Knight</option>
          <option value="elio lefleur">Elio LeFleur</option>
          <option value="jackson drake">Jackson Drake</option>
          <option value="jasper troy">Jasper Troy</option>
          <option value="kale dixon">Kale Dixon</option>
          <option value="keanu carver">Keanu Carver</option>
          <option value="kendal grey">Kendal Grey</option>
          <option value="lainey reid">Lainey Reid</option>
          <option value="lucien price">Lucien Price</option>
          <option value="niko vance">Niko Vance</option>
          <option value="osiris griffin">Osiris Griffin</option>
          <option value="ricky smokes">Ricky Smokes</option>
          <option value="saquon shugars">Saquon Shugars</option>
          <option value="shiloh hill">Shiloh Hill</option>
        </select>

        <span class="search-divider">or</span>

        <label for="wrestlerInput" class="sr-only">Enter a wrestler name</label>
        <input
          id="wrestlerInput"
          type="text"
          placeholder="Enter a WWE wrestler name"
          list="wrestlerSuggestions"
          autocomplete="off"
        />

        <datalist id="wrestlerSuggestions">
          <option value="Arianna Grace"></option>
          <option value="Brad Baylor"></option>
          <option value="Bronco Nima"></option>
          <option value="Cutler James"></option>
          <option value="Dion Lennox"></option>
          <option value="Eli Knight"></option>
          <option value="Elio LeFleur"></option>
          <option value="Jackson Drake"></option>
          <option value="Jasper Troy"></option>
          <option value="Kale Dixon"></option>
          <option value="Keanu Carver"></option>
          <option value="Kendal Grey"></option>
          <option value="Lainey Reid"></option>
          <option value="Lucien Price"></option>
          <option value="Niko Vance"></option>
          <option value="Osiris Griffin"></option>
          <option value="Ricky Smokes"></option>
          <option value="Saquon Shugars"></option>
          <option value="Shiloh Hill"></option>
        </datalist>

        <button id="generateBtn" type="button">Generate</button>
      </section>

      <section id="status" class="status"></section>

      <section id="results" class="results hidden">
        <div class="card result-title-card">
          <h2 id="resultWrestlerName">Generated Build</h2>
          <p id="resultSubtitle">Gameplay-focused prototype output</p>
        </div>

        <div class="card">
          <h2>Core Attributes</h2>
          <div id="coreAttributes" class="grid"></div>
        </div>

        <div class="card">
          <h2>AI Attributes</h2>
          <div id="aiAttributes" class="grid"></div>
        </div>
<div class="card">
  <h2>Full Moveset</h2>
  <div id="moveset" class="grid"></div>
</div>
        <div class="card">
          <h2>Signatures</h2>
          <ul id="signatures"></ul>
        </div>

        <div class="card">
          <h2>Finishers</h2>
          <ul id="finishers"></ul>
        </div>

        <div class="card">
          <h2>Taunts</h2>
          <ul id="taunts"></ul>
        </div>

        <div class="card">
          <h2>Skill Points</h2>
          <div id="skillPoints" class="grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
